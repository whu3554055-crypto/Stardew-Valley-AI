name: CI - Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ========================================================================
  # Godot GDScript Tests
  # ========================================================================
  test-godot:
    name: Test Godot Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.2.1
          use-dotnet: false

      - name: Verify Godot installation
        run: godot --version

      - name: Run GDScript lint (if configured)
        run: |
          if [ -f ".godot/gdscript_lint_config.json" ]; then
            echo "Running GDScript lint..."
            # Add linting command here when linter is set up
          else
            echo "No GDScript linter configured, skipping..."
          fi
        continue-on-error: true

      - name: Validate project structure
        run: |
          echo "Checking critical files..."
          test -f "project.godot" && echo "✓ project.godot exists" || exit 1
          test -d "autoload" && echo "✓ autoload directory exists" || exit 1
          test -d "environment_system" && echo "✓ environment_system exists" || exit 1
          echo "Project structure validated!"

  # ========================================================================
  # Python Backend Tests
  # ========================================================================
  test-python:
    name: Test Python Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./hello_agent_backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov black pylint

      - name: Lint with pylint
        run: |
          if [ -f "pylintrc" ]; then
            pylint --rcfile=pylintrc .
          else
            echo "No pylintrc found, running with defaults..."
            pylint . || true
          fi
        continue-on-error: true

      - name: Format check with black
        run: |
          black --check . || echo "Code formatting issues found (non-blocking)"
        continue-on-error: true

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=html || echo "Tests pending implementation"
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: always()
        with:
          file: ./hello_agent_backend/coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true

  # ========================================================================
  # Documentation Validation
  # ========================================================================
  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check markdown files
        run: |
          echo "Validating documentation structure..."
          find docs/ -name "*.md" -type f | while read file; do
            echo "✓ Found: $file"
          done
          echo "Documentation validation complete!"

      - name: Verify required documents
        run: |
          echo "Checking required documentation..."
          test -f "docs/01-技术架构与优化/04-环境影响系统与Hello-Agent集成方案.md" && echo "✓ Architecture doc exists" || echo "⚠ Architecture doc missing"
          test -f "docs/01-技术架构与优化/05-环境与Agent实施清单.md" && echo "✓ Implementation checklist exists" || echo "⚠ Checklist missing"
          test -f "docs/03-研发管理/02-产品级实施路线图.md" && echo "✓ Roadmap exists" || echo "⚠ Roadmap missing"

  # ========================================================================
  # Configuration Validation
  # ========================================================================
  validate-configs:
    name: Validate Configuration Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate JSON configs
        run: |
          echo "Validating JSON configuration files..."
          for file in $(find data/ -name "*.json" -type f); do
            if python3 -m json.tool "$file" > /dev/null 2>&1; then
              echo "✓ Valid: $file"
            else
              echo "✗ Invalid: $file"
              exit 1
            fi
          done
          echo "All JSON configs are valid!"

      - name: Check environment config structure
        run: |
          echo "Checking environment configs..."
          test -f "data/environment_configs/seasons.json" && echo "✓ seasons.json exists" || exit 1
          test -f "data/environment_configs/weather.json" && echo "✓ weather.json exists" || exit 1
          test -d "data/environment_configs/items" && echo "✓ items directory exists" || exit 1
          echo "Environment config structure validated!"

  # ========================================================================
  # Build Verification (Optional - for future exports)
  # ========================================================================
  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    if: false  # Disabled until export presets are configured

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.2.1

      - name: Attempt headless export
        run: |
          godot --headless --export-debug "Linux/X11" build/game || echo "Export not configured yet"
        continue-on-error: true
