[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    integration: marks tests as integration tests (require running services)
    slow: marks tests as slow (may take several seconds)
    unit: marks tests as unit tests (fast, isolated)

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Async support
asyncio_mode = auto

